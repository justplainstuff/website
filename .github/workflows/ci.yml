name: ci 🚀

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
        name: checkout code 📥
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: install dependencies 🔧
        run: bun install
      - name: build ✅
        run: bun run build
      - name: test ✅
        run: bun test
